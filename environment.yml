name: mostar_env
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.10
  # Core Assembly & Polishing 
  - flye
  - medaka=2.2.0
  - filtlong
  - polypolish
  # Pre-processing & Alignment 
  - fastp
  - bwa
  - samtools>=1.19
  - bcftools>=1.19
  - minimap2
  # Annotation & Profiling
  - bakta
  - ncbi-amrfinderplus
  - blast>=2.15.0
  - kraken2
  - emu
  # ICE & Conjugation Detection
  - macsyfinder
  - macsy-profile-conjscan
  # Python Libraries
  - matplotlib
  - numpy
  - pandas
  - biopython
  # Supporting Utilities 
  - mamba
  - osfclient 
  - bc        
  - wget       
  - curl       
