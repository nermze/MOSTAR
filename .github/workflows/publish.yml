name: Upload Python Package to PyPI

on:
  release:
    types: [published]

jobs:
  pypi-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: python -m pip install --upgrade build

      - run: python -m build

      - uses: pypa/gh-action-pypi-publish@release/v1
