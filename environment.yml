name: mostar_env
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.10
  # Core Assembly & Polishing 
  - flye
  - medaka=2.2.0
  - filtlong
  - polypolish
  # Pre-processing & Alignment
  - fastp
  - bwa
  - samtools>=1.19
  - bcftools>=1.19
  - minimap2
  - circlator
  # Annotation & Profiling
  - bakta
  - ncbi-amrfinderplus
  - blast>=2.15.0
  - kraken2
  - emu
  # ICE & Conjugation Detection
  - macsyfinder
  # Plasticity & Mobile Elements
  - genomad
  # Python Libraries for Visualization & Reports
  - matplotlib
  - numpy
  - pandas
  - biopython
  # Supporting Utilities
  - mamba
  - osfclient
  - wget
  - curl
